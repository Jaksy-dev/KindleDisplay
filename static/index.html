<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KindleDisplay</title>
<style>
body {
  font-family: 'Courier New', Courier, monospace;
  background: #ffffff;
  color: #000000;
  padding: 16px;
  font-size: xx-large;
}
h1 {
  font-family: 'Courier New', Courier, monospace;
  font-size: xx-large;
  font-weight: bold;
  margin: 0 0 12px 0;
  padding-bottom: 10px;
  border-bottom: 3px solid #000;
  letter-spacing: 2px;
}
.row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  grid-template-rows: auto auto;
  column-gap: 16px;
  padding: 12px 0;
}
.badge {
  grid-column: 1;
  grid-row: 1 / 3;
  align-self: stretch;
  display: flex;
  align-items: center;
  justify-content: center;
}
.destination {
  grid-column: 2;
  grid-row: 1;
  align-self: end;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -1px;
}
.times {
  grid-column: 2;
  grid-row: 2;
  align-self: start;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -1px;
}
hr.row-sep {
  border: none;
  border-top: 2px solid #ccc;
  margin: 4px 0;
}
.badge-80 {
  display: inline-block;
  background: #E41F18;
  color: #ffffff;
  border-radius: 12px;
  padding: 6px 30px;
  font-weight: bold;
}
.badge-H8 {
  display: inline-block;
  background: #ED6E86;
  color: #ffffff;
  border-radius: 36px;
  padding: 10px 10px;
  font-weight: bold;
}
.badge-45 {
  display: inline-block;
  background: #009EE3;
  color: #ffffff;
  border-radius: 12px;
  padding: 6px 30px;
  font-weight: bold;
}
</style>
</head>
<body>
<h1>Menetrend</h1>

<div id="line80" class="row">
  <span class="badge"><span class="badge-80">80</span></span>
  <span class="destination">Örs vezér tere</span>
  <span class="times" id="out80">loading…</span>
</div>
<hr class="row-sep">
<div id="lineH8" class="row">
  <span class="badge"><span class="badge-H8">H8</span></span>
  <span class="destination">Örs vezér tere</span>
  <span class="times" id="outH8">loading…</span>
</div>
<hr class="row-sep">
<div id="line45" class="row">
  <span class="badge"><span class="badge-45">45</span></span>
  <span class="destination">Cinkota, Lassú utca</span>
  <span class="times" id="out45">loading…</span>
</div>

<script>
function render(id, arr) {
  document.getElementById(id).innerHTML =
    arr.length ? arr.join('\' ') + '\'' : '&ndash;';
}
function load() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/data', true);
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        var data = JSON.parse(xhr.responseText);
        render('out80', data['80']);
        render('outH8', data['H8']);
        render('out45', data['45']);
      } else {
        document.getElementById('out80').textContent = 'error: ' + xhr.status;
        document.getElementById('outH8').textContent = 'error: ' + xhr.status;
        document.getElementById('out45').textContent = 'error: ' + xhr.status;
      }
    }
  };
  xhr.send();
}
load();
setInterval(load, 20000);
</script>
</body>
</html>
